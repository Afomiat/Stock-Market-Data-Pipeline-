version: '3.8'

services:
  app:
    build: .
    container_name: stock_pipeline_api
    ports:
      - "8080:8080"
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: stock_pipeline_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data: